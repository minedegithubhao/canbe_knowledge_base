name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare publish graph
        shell: pwsh
        run: |
          ./scripts/prepare-publish-graph.ps1

      - name: Verify publish graph
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la

          echo ""
          echo "=== Publish graph structure ==="
          ls -la .publish-graph/

          echo ""
          echo "=== Publish pages ==="
          ls -la .publish-graph/pages/

          echo ""
          echo "=== Copy config.edn to publish graph root ==="
          if [ ! -f ".publish-graph/config.edn" ] && [ -f ".publish-graph/logseq/config.edn" ]; then
            cp .publish-graph/logseq/config.edn .publish-graph/config.edn
            echo "Copied config.edn"
          elif [ -f ".publish-graph/config.edn" ]; then
            echo "config.edn already exists"
          else
            echo "config.edn not found"
            exit 1
          fi

          echo ""
          echo "=== Validate pages-directory in config.edn ==="
          if grep -q "pages-directory" .publish-graph/config.edn; then
            grep "pages-directory" .publish-graph/config.edn
          else
            echo "pages-directory not found, Logseq will use the default pages directory"
          fi

      - name: Build with Logseq Publish SPA
        id: build
        uses: logseq/publish-spa@v0.3.1
        with:
          graph-directory: .publish-graph
          output-directory: www

      - name: Debug build output
        run: |
          echo "========================================="
          echo "=== JSON files in build output ==="
          echo "========================================="
          json_files=$(find www -name "*.json" -type f 2>/dev/null)
          if [ -n "$json_files" ]; then
            echo "$json_files"
          else
            echo "No JSON files found in build output"
          fi

          echo ""
          echo "========================================="
          echo "=== index.html ==="
          echo "========================================="
          if [ -f "www/index.html" ]; then
            cat www/index.html
          else
            echo "index.html is missing"
            exit 1
          fi

      - name: Add .nojekyll
        run: touch www/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
