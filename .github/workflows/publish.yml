# .github/workflows/publish.yml 新增校验步骤
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check files
        run: |
          ls -la
          ls -la logseq/
          ls -la pages/

      - name: Build Logseq Site
        uses: logseq/publish-spa@v0.3.1
        with:
          graph-directory: .
          output-directory: www

      # 新增：校验 pages.json 是否生成（关键！）
      - name: Verify pages.json exists
        run: |
          ls -la www/static/js/  # 打印目录，确认 pages.json 存在
          if [ ! -f "www/static/js/pages.json" ]; then
            echo "ERROR: pages.json not found in www/static/js/"
            exit 1
          fi

      - name: Add .nojekyll
        run: touch www/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true