# .github/workflows/publish.yml - 最终解决方案
name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 1: 准备配置文件
      - name: Prepare config.edn at root
        run: |
          echo "=== 复制配置文件到根目录 ==="
          if [ ! -f "config.edn" ] && [ -f "logseq/config.edn" ]; then
            cp logseq/config.edn config.edn
            echo "✅ 已复制 config.edn"
          elif [ -f "config.edn" ]; then
            echo "✅ config.edn 已存在"
          else
            echo "❌ 未找到 config.edn"
            exit 1
          fi
          
          echo "=== 验证 pages 目录 ==="
          ls -la pages/

      # 步骤 2: 使用 logseq/publish-spa@v0.3.1
      - name: Build with Logseq Publish SPA
        id: build
        uses: logseq/publish-spa@v0.3.1
        with:
          graph-directory: .
          output-directory: www

      # 步骤 3: 详细调试输出 - 必须查看构建结果
      - name: Debug build output
        run: |
          echo "========================================="
          echo "=== 构建输出目录结构 ==="
          echo "========================================="
          find www -type f | sort
          
          echo ""
          echo "========================================="
          echo "=== 检查所有 JSON 文件 ==="
          echo "========================================="
          find www -name "*.json" -type f
          
          echo ""
          echo "========================================="
          echo "=== 检查 index.html ==="
          echo "========================================="
          if [ -f "www/index.html" ]; then
            echo "✅ index.html 存在"
            echo "文件大小:"
            ls -lh www/index.html
            echo "文件内容前 50 行:"
            head -50 www/index.html
          else
            echo "❌ index.html 不存在"
          fi
          
          echo ""
          echo "========================================="
          echo "=== 检查 static/js 目录 ==="
          echo "========================================="
          if [ -d "www/static/js" ]; then
            echo "static/js 目录存在，包含:"
            ls -la www/static/js/
          else
            echo "⚠️ static/js 目录不存在"
          fi

      # 步骤 4: 添加 .nojekyll
      - name: Add .nojekyll
        run: touch www/.nojekyll

      # 步骤 5: 部署
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
