name: Publish Logseq to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 明确拉取到根目录，避免多一层文件夹
          path: ./canbe_knowledge_base

      # 新增：打印完整目录结构（方便验证）
      - name: Print full directory structure
        run: ls -la ./canbe_knowledge_base && ls -la ./canbe_knowledge_base/pages/

      - name: Build Logseq Site
        uses: logseq/publish-spa@v0.3.1
        with:
          # 指向包含 pages/ 的正确目录
          graph-directory: ./canbe_knowledge_base
          output-directory: ./canbe_knowledge_base/www

      - name: Add .nojekyll
        run: touch ./canbe_knowledge_base/www/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./canbe_knowledge_base/www
          branch: gh-pages
          clean: true
          single-commit: true