# .github/workflows/publish.yml - 使用 npm 构建的替代方案
name: Logseq Publish to GitHub Pages (npm build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 1: 准备配置文件
      - name: Prepare config.edn
        run: |
          echo "=== 复制配置文件到根目录 ==="
          if [ ! -f "config.edn" ] && [ -f "logseq/config.edn" ]; then
            cp logseq/config.edn config.edn
            echo "✅ 已复制 config.edn"
          elif [ -f "config.edn" ]; then
            echo "✅ config.edn 已存在"
          else
            echo "❌ 未找到 config.edn"
            exit 1
          fi
          
          echo "=== 验证 pages 目录 ==="
          ls -la pages/

      # 步骤 2: 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 步骤 3: 使用 npm 安装并运行 Logseq Publish
      - name: Install and run Logseq Publish
        run: |
          echo "=== 全局安装 @logseq/publish ==="
          npm install -g @logseq/publish
          
          echo "=== 运行构建命令 ==="
          npx @logseq/publish --input . --output www
          
          echo "=== 构建完成，检查输出 ==="
          ls -la www/ || echo "www 目录不存在"

      # 步骤 4: 详细调试输出
      - name: Debug output
        run: |
          echo "=== 完整文件列表 ==="
          find www -type f 2>/dev/null | sort || echo "www 目录为空"
          
          echo "=== 所有 JSON 文件 ==="
          find www -name "*.json" -type f 2>/dev/null || echo "无 JSON 文件"
          
          echo "=== index.html 是否存在 ==="
          test -f www/index.html && echo "✅ index.html 存在" || echo "❌ index.html 不存在"

      # 步骤 5: 添加 .nojekyll
      - name: Add .nojekyll
        run: touch www/.nojekyll

      # 步骤 6: 部署
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
