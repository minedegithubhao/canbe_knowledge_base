# .github/workflows/publish.yml 最终正确版
name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史

      # 核心修正：使用官方 Action 构建，而非 npm 安装
      - name: Build Logseq static site
        uses: logseq/publish-spa@v0.3.1  # 直接用 GitHub Action，而非 npm 包
        with:
          graph-directory: .
          output-directory: www

      - name: Check pages.json existence
        run: |
          ls -la www/static/js/ || true  # 即使目录不存在也不报错
          # 全局搜索 pages.json，确认实际生成位置
          find www -name "pages.json" || echo "pages.json 未找到"

      - name: Add .nojekyll file
        run: touch www/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true