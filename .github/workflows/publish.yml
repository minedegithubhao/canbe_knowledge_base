# .github/workflows/publish.yml 完整调试版
name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史

      # 步骤 1: 在构建前准备配置文件
      - name: Prepare config.edn at root
        run: |
          echo "=== 当前目录结构 ==="
          pwd
          ls -la
          
          echo ""
          echo "=== 检查 logseq 子目录 ==="
          ls -la logseq/ 2>/dev/null || echo "logseq 目录不存在"
          
          echo ""
          echo "=== 检查 pages 目录 ==="
          ls -la pages/ 2>/dev/null || echo "pages 目录不存在"
          
          echo ""
          echo "=== 复制配置文件 ==="
          if [ ! -f "config.edn" ] && [ -f "logseq/config.edn" ]; then
            cp logseq/config.edn config.edn
            echo "✅ 已复制 config.edn 到根目录"
            ls -la config.edn
          elif [ -f "config.edn" ]; then
            echo "✅ config.edn 已存在于根目录"
            ls -la config.edn
          else
            echo "❌ 错误：未找到 config.edn 文件"
            exit 1
          fi

      # 步骤 2: 构建 Logseq 静态站点
      - name: Build Logseq static site
        uses: logseq/publish-spa@v0.3.1
        with:
          graph-directory: .
          output-directory: www

      # 步骤 3: 详细检查构建输出
      - name: Debug build output
        run: |
          echo ""
          echo "=== 检查 www 根目录 ==="
          ls -la www/
          
          echo ""
          echo "=== 检查 www 所有文件和目录（递归） ==="
          find www -type f -o -type d | sort
          
          echo ""
          echo "=== 检查 static 目录 ==="
          if [ -d "www/static" ]; then
            ls -laR www/static/
          else
            echo "⚠️ static 目录不存在"
          fi
          
          echo ""
          echo "=== 查找所有 JSON 文件 ==="
          find www -name "*.json" -type f
          
          echo ""
          echo "=== 查找 pages.json 或 graph.json ==="
          find www \( -name "pages.json" -o -name "graph.json" \) -type f
          
          echo ""
          echo "=== 检查 index.html ==="
          if [ -f "www/index.html" ]; then
            echo "✅ index.html 存在"
            head -50 www/index.html
          else
            echo "❌ index.html 不存在"
          fi

      # 步骤 4: 添加 .nojekyll 文件
      - name: Add .nojekyll file
        run: touch www/.nojekyll

      # 步骤 5: 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
          # 启用详细日志
          verbose: true
