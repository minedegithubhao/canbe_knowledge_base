# .github/workflows/publish.yml 最终正确版
name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史

      # 核心修正：使用官方 Action 构建，而非 npm 安装
      - name: Build Logseq static site
        uses: logseq/publish-spa@v0.3.1
        with:
          graph-directory: .
          output-directory: www

      # 新增步骤：将 config.edn 复制到根目录（如果不存在）
      - name: Ensure config.edn exists at root
        run: |
          if [ ! -f "config.edn" ] && [ -f "logseq/config.edn" ]; then
            cp logseq/config.edn config.edn
            echo "已复制 config.edn 到根目录"
          elif [ -f "config.edn" ]; then
            echo "config.edn 已存在于根目录"
          else
            echo "错误：未找到 config.edn 文件"
            exit 1
          fi

      - name: Check pages.json existence
        run: |
          ls -la www/static/js/ || true  # 即使目录不存在也不报错
          # 全局搜索 pages.json，确认实际生成位置
          find www -name "pages.json" || echo "pages.json 未找到"

      - name: Add .nojekyll file
        run: touch www/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
