# .github/workflows/publish.yml - 使用具体版本号
name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 1: 准备配置文件
      - name: Prepare config.edn at root
        run: |
          echo "=== 复制配置文件到根目录 ==="
          if [ ! -f "config.edn" ] && [ -f "logseq/config.edn" ]; then
            cp logseq/config.edn config.edn
            echo "✅ 已复制 config.edn"
          elif [ -f "config.edn" ]; then
            echo "✅ config.edn 已存在"
          else
            echo "❌ 未找到 config.edn"
            exit 1
          fi
          
          echo "=== 验证 pages 目录 ==="
          ls -la pages/

      # 步骤 2: 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 步骤 3: 使用logseq/publish-spa v0.3.1 (已知版本)
      - name: Build with Logseq Publish SPA
        id: build
        uses: logseq/publish-spa@v0.3.1
        with:
          graph-directory: .
          output-directory: www
        continue-on-error: true

      # 步骤 4: 如果官方 Action 失败，使用备用 npm 方案
      - name: Fallback - Use npm package
        if: steps.build.outcome == 'failure'
        run: |
          echo "⚠️ 官方 Action 失败，尝试使用 npm 包构建..."
          
          echo "=== 安装 @logseq/cli ==="
          npm install -g @logseq/cli
          
          echo "=== 运行 logseq export ==="
          npx logseq export --input . --output www || {
            echo "logseq export 失败，尝试手动创建基本结构..."
            
            # 创建基本的 HTML 结构
            mkdir -p www
            
            # 创建 index.html
            echo '<!DOCTYPE html>' > www/index.html
            echo '<html lang="zh-CN">' >> www/index.html
            echo '<head>' >> www/index.html
            echo '    <meta charset="UTF-8">' >> www/index.html
            echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0">' >> www/index.html
            echo '    <title>Logseq Graph</title>' >> www/index.html
            echo '    <style>' >> www/index.html
            echo '        body { font-family: Arial, sans-serif; margin: 40px; }' >> www/index.html
            echo '        h1 { color: #333; }' >> www/index.html
            echo '        ul { list-style-type: none; padding: 0; }' >> www/index.html
            echo '        li { margin: 10px 0; }' >> www/index.html
            echo '        a { color: #0066cc; text-decoration: none; }' >> www/index.html
            echo '        a:hover { text-decoration: underline; }' >> www/index.html
            echo '    </style>' >> www/index.html
            echo '</head>' >> www/index.html
            echo '<body>' >> www/index.html
            echo '    <h1>My Logseq Graph</h1>' >> www/index.html
            echo '    <ul>' >> www/index.html
            
            # 添加 pages 列表
            for page in pages/*.md; do
              if [ -f "$page" ]; then
                basename=$(basename "$page" .md)
                echo "        <li><a href=\"pages/$basename.html\">$basename</a></li>" >> www/index.html
              fi
            done
            
            echo '    </ul>' >> www/index.html
            echo '</body>' >> www/index.html
            echo '</html>' >> www/index.html
            
            # 复制 pages 目录
            if [ -d "pages" ]; then
              mkdir -p www/pages
              cp -r pages/* www/pages/ 2>/dev/null || true
            fi
            
            echo "✅ 基本结构创建完成"
          }
          
          echo "=== 检查输出 ==="
          ls -la www/ || echo "www 目录不存在"

      # 步骤 5: 详细调试输出
      - name: Debug build output
        run: |
          echo "=== 完整文件列表 ==="
          find www -type f 2>/dev/null | sort || echo "www 目录为空"
          
          echo "=== 所有 JSON 文件 ==="
          find www -name "*.json" -type f 2>/dev/null || echo "无 JSON 文件"
          
          echo "=== index.html 是否存在 ==="
          test -f www/index.html && echo "✅ index.html 存在" || echo "❌ index.html 不存在"
          
          echo "=== www 目录结构 ==="
          ls -laR www/ | head -100

      # 步骤 6: 添加 .nojekyll
      - name: Add .nojekyll
        run: touch www/.nojekyll

      # 步骤 7: 部署
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
