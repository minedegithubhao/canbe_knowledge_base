# .github/workflows/publish.yml 最终可用版
name: Logseq Publish to GitHub Pages

# 触发事件配置（修复之前的 on 字段问题）
on:
  # 推送到 main 分支自动触发
  push:
    branches: [ main ]
  # 手动触发（方便调试）
  workflow_dispatch:

# 权限配置（避免部署权限不足）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史

      - name: 检查仓库目录结构
        run: |
          ls -la
          ls -la logseq/ || echo "logseq 目录不存在"
          ls -la pages/ || echo "pages 目录不存在"

      # 核心修复：使用 logseq/publish-spa 官方最新可用版本
      - name: 构建 Logseq 静态站点
        uses: logseq/publish-spa@v0.3.1  # 该版本是官方确认可用的稳定版
        with:
          graph-directory: .
          output-directory: www

      - name: 校验 pages.json 是否生成（关键）
        run: |
          ls -la www/static/js/  # 打印目录内容，方便排查
          if [ ! -f "www/static/js/pages.json" ]; then
            echo "❌ 错误：pages.json 未生成！"
            exit 1
          else
            echo "✅ pages.json 生成成功"
          fi

      - name: 添加 .nojekyll 文件（避免 GitHub Pages 解析错误）
        run: touch www/.nojekyll

      - name: 部署到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true  # 清空旧分支内容，避免缓存