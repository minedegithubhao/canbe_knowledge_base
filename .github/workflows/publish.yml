# .github/workflows/publish.yml
name: Logseq Publish to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install publish-spa
        run: npm install -g @logseq/publish-spa@0.3.1

      - name: Build Logseq site
        run: |
          logseq-publish-spa \
            --graph-directory . \
            --output-directory www \
            --verbose

      - name: Check pages.json
        run: |
          ls -la www/static/js/
          if [ ! -f "www/static/js/pages.json" ]; then
            echo "⚠️ pages.json not found, continuing deployment..."
          else
            echo "✅ pages.json generated successfully"
          fi

      - name: Add .nojekyll
        run: touch www/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true