# logseq/publish.yml 核心配置修正
title: "Canbe Knowledge Base"
description: "My Logseq Knowledge Base"
basePath: "/canbe_knowledge_base"  # 必须与仓库名完全一致（小写/下划线）
# 确保覆盖所有需要发布的文件（包含生成 pages.json 所需的元数据）
pages:
  - "pages/**/*.md"
  - "journals/**/*.md"
  - "logseq/**/*.edn"  # 新增：确保读取 config.edn 配置
exclude:
  - ".git/**"
  - ".github/**"
force: true  # 强制生成所有元数据（包括 pages.json）
# 新增：显式指定输出静态资源（部分版本需手动声明）
static:
  - "static/**/*"