# logseq/publish.yml 完整配置
title: "Canbe Knowledge Base"
description: "My Logseq Knowledge Base"
basePath: "/canbe_knowledge_base"  # 必须和你的仓库名完全一致（小写）
# 强制包含所有页面和元数据
pages:
  - "**/*.md"  # 匹配所有 markdown 文件
  - "**/*.edn"  # 匹配 Logseq 配置文件
# 排除不需要的文件
exclude:
  - ".git/**"
  - ".github/**"
  - "node_modules/**"
  - "logseq/node_modules/**"
# 关键：开启完整元数据生成
features:
  - "pages-index"  # 强制生成 pages.json 索引
force: true  # 强制重新生成所有内容，避免缓存